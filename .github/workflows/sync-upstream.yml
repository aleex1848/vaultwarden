name: Sync Upstream
permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sync-upstream
  cancel-in-progress: false

on:
  schedule:
    # Daily 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "sync = merge upstream; fix-ci = auto-fix fmt/clippy/typos on sync branch via Cursor"
        type: choice
        options:
          - sync
          - fix-ci
        default: sync
      dry_run:
        description: "Do not push or open/update a PR"
        type: boolean
        default: false
      cursor_model:
        description: "Cursor CLI model id"
        type: string
        default: "composer-2.5"

defaults:
  run:
    shell: bash

jobs:
  sync:
    name: Sync / fix CI
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    permissions:
      contents: write
      pull-requests: write
    env:
      RUSTFLAGS: "-Dwarnings"
      MODE: ${{ inputs.mode || 'sync' }}

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ (inputs.mode || 'sync') == 'fix-ci' && 'sync/upstream-public-api' || 'feature-public-api' }}
          fetch-depth: 0
          persist-credentials: true

      - name: Install Cursor CLI
        run: |
          curl https://cursor.com/install -fsS | bash
          echo "${HOME}/.cursor/bin" >> "${GITHUB_PATH}"

      - name: Install typos
        run: |
          TMP_DIR="${RUNNER_TEMP}/typos-install"
          mkdir -p "${TMP_DIR}"
          curl -LsSf https://github.com/crate-ci/typos/releases/download/v1.47.2/typos-v1.47.2-x86_64-unknown-linux-musl.tar.gz \
            -o "${TMP_DIR}/typos.tgz"
          tar -xzf "${TMP_DIR}/typos.tgz" -C "${TMP_DIR}"
          sudo install -m 0755 "${TMP_DIR}/typos" /usr/local/bin/typos
          typos --version

      - name: Merge upstream (no publish yet)
        id: sync
        if: env.MODE == 'sync'
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          FEATURE_BRANCH: feature-public-api
          SYNC_BRANCH: sync/upstream-public-api
          UPSTREAM_URL: https://github.com/dani-garcia/vaultwarden.git
          UPSTREAM_REF: main
          PROMPT_FILE: .github/prompts/sync-public-api.md
          CURSOR_MODEL: ${{ inputs.cursor_model || 'composer-2.5' }}
        run: |
          chmod +x .github/scripts/sync-upstream.sh
          .github/scripts/sync-upstream.sh

      - name: Prepare fix-ci outputs
        id: sync_fix
        if: env.MODE == 'fix-ci'
        run: |
          echo "changed=true" >> "${GITHUB_OUTPUT}"
          echo "conflicted=false" >> "${GITHUB_OUTPUT}"
          echo "cursor_used=false" >> "${GITHUB_OUTPUT}"
          echo "upstream_sha=$(git rev-parse HEAD)" >> "${GITHUB_OUTPUT}"
          echo "suggested_tag=" >> "${GITHUB_OUTPUT}"
          echo "sync_branch=sync/upstream-public-api" >> "${GITHUB_OUTPUT}"

      - name: Install build dependencies
        if: (env.MODE == 'fix-ci') || (steps.sync.outputs.changed == 'true')
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            openssl build-essential libssl-dev pkg-config \
            libmariadb-dev-compat libpq-dev

      - name: Init toolchain
        if: (env.MODE == 'fix-ci') || (steps.sync.outputs.changed == 'true')
        id: toolchain
        run: |
          RUST_TOOLCHAIN="$(grep -m1 -oP 'channel.*"(\K.*?)(?=")' rust-toolchain.toml)"
          echo "RUST_TOOLCHAIN=${RUST_TOOLCHAIN}" | tee -a "${GITHUB_OUTPUT}"

      - name: Install toolchain
        if: (env.MODE == 'fix-ci') || (steps.sync.outputs.changed == 'true')
        env:
          RUST_TOOLCHAIN: ${{ steps.toolchain.outputs.RUST_TOOLCHAIN }}
        run: |
          rm -f rust-toolchain.toml
          rustup toolchain install "${RUST_TOOLCHAIN}" --profile minimal --no-self-update
          rustup component add --toolchain "${RUST_TOOLCHAIN}" rustfmt clippy
          rustup default "${RUST_TOOLCHAIN}"
          rustc -vV
          cargo -vV

      - name: Rust Caching
        if: (env.MODE == 'fix-ci') || (steps.sync.outputs.changed == 'true')
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          prefix-key: "v2025.09-rust-sync"
          shared-key: "sync-sqlite-clippy"

      - name: cargo check (sqlite)
        if: env.MODE == 'sync' && steps.sync.outputs.changed == 'true'
        run: cargo check --features sqlite

      - name: Auto-fix fmt/clippy/typos with Cursor
        id: cifix
        if: (env.MODE == 'fix-ci') || (steps.sync.outputs.changed == 'true')
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          PROMPT_FILE: .github/prompts/fix-ci-public-api.md
          CURSOR_MODEL: ${{ inputs.cursor_model || 'composer-2.5' }}
          MAX_CI_FIX_ROUNDS: "5"
        run: |
          chmod +x .github/scripts/fix-ci-with-cursor.sh
          .github/scripts/fix-ci-with-cursor.sh

      - name: Publish sync branch and PR
        id: publish
        if: >
          ((env.MODE == 'fix-ci') || (steps.sync.outputs.changed == 'true'))
          && (github.event_name != 'workflow_dispatch' || inputs.dry_run == false)
          && steps.cifix.outputs.ci_ok == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          FEATURE_BRANCH: feature-public-api
          SYNC_BRANCH: sync/upstream-public-api
          UPSTREAM_SHA: ${{ steps.sync.outputs.upstream_sha || steps.sync_fix.outputs.upstream_sha }}
          SUGGESTED_TAG: ${{ steps.sync.outputs.suggested_tag || steps.sync_fix.outputs.suggested_tag }}
          CONFLICTED: ${{ steps.sync.outputs.conflicted || steps.sync_fix.outputs.conflicted }}
          CURSOR_USED: ${{ steps.sync.outputs.cursor_used || steps.sync_fix.outputs.cursor_used }}
          CI_FIXED: ${{ steps.cifix.outputs.ci_fixed }}
          UPSTREAM_REF: main
          MODE: ${{ env.MODE }}
        run: |
          set -euo pipefail

          # GITHUB_TOKEN cannot push commits that modify .github/workflows/*.
          git checkout "origin/${FEATURE_BRANCH}" -- .github/workflows/ 2>/dev/null \
            || git checkout "origin/${SYNC_BRANCH}" -- .github/workflows/
          if ! git diff --cached --quiet -- .github/workflows/; then
            git -c user.name="github-actions[bot]" \
                -c user.email="41898282+github-actions[bot]@users.noreply.github.com" \
                commit -m "chore(sync): retain fork GitHub Actions workflows" || true
          fi

          git push --force origin "HEAD:${SYNC_BRANCH}"

          PR_TITLE="chore(sync): merge upstream/${UPSTREAM_REF} into ${FEATURE_BRANCH}"
          PR_BODY="$(cat <<EOF
          ## Summary

          Automated sync of \`dani-garcia/vaultwarden\` (\`upstream/${UPSTREAM_REF}\`) into \`${FEATURE_BRANCH}\`.

          | | |
          |---|---|
          | Mode | \`${MODE}\` |
          | Upstream SHA | \`${UPSTREAM_SHA}\` |
          | Conflicts | ${CONFLICTED} |
          | Cursor (merge) | ${CURSOR_USED} |
          | Cursor (CI fix) | ${CI_FIXED} |
          | Suggested image tag | \`${SUGGESTED_TAG:-n/a}\` |

          ## Notes

          - Strategy is **merge** (not rebase) so this PR stays reviewable.
          - Cursor resolves merge conflicts and auto-fixes fmt/clippy/typos before publish.
          - Auto-merge is enabled; GitHub merges when required checks are green.
          - Fork \`.github/workflows\` are retained on purpose: \`GITHUB_TOKEN\` cannot push workflow file updates.

          ## Test plan

          - [ ] \`build.yml\` / typos checks are green
          - [ ] Spot-check Public API routes if \`src/api/core/public.rs\` changed
          EOF
          )"
          PR_BODY="$(sed -e 's/^          //' <<<"${PR_BODY}")"

          EXISTING_PR="$(gh pr list --base "${FEATURE_BRANCH}" --head "${SYNC_BRANCH}" --state open --json number --jq '.[0].number // empty')"
          if [[ -n "${EXISTING_PR}" ]]; then
            echo "Updating existing PR #${EXISTING_PR}"
            gh pr edit "${EXISTING_PR}" --title "${PR_TITLE}" --body "${PR_BODY}" || true
            echo "pr_number=${EXISTING_PR}" >> "${GITHUB_OUTPUT}"
            PR_NUM="${EXISTING_PR}"
          else
            echo "Creating PR"
            if PR_URL="$(gh pr create --base "${FEATURE_BRANCH}" --head "${SYNC_BRANCH}" --title "${PR_TITLE}" --body "${PR_BODY}")"; then
              echo "PR: ${PR_URL}"
              echo "pr_url=${PR_URL}" >> "${GITHUB_OUTPUT}"
              PR_NUM="$(gh pr list --base "${FEATURE_BRANCH}" --head "${SYNC_BRANCH}" --state open --json number --jq '.[0].number // empty')"
              echo "pr_number=${PR_NUM}" >> "${GITHUB_OUTPUT}"
            else
              echo "PR create failed (token permissions). Branch was pushed: ${SYNC_BRANCH}"
              PR_NUM=""
            fi
          fi

          if [[ -n "${PR_NUM}" ]]; then
            echo "Enabling auto-merge for PR #${PR_NUM}"
            # Merge commit keeps history; waits until required status checks are green.
            if gh pr merge "${PR_NUM}" --auto --merge; then
              echo "auto_merge=true" >> "${GITHUB_OUTPUT}"
            else
              echo "Auto-merge could not be enabled (check repo Allow auto-merge + ruleset)."
              echo "auto_merge=false" >> "${GITHUB_OUTPUT}"
            fi
          fi

      - name: Summary
        if: always()
        env:
          MODE: ${{ env.MODE }}
          CHANGED: ${{ steps.sync.outputs.changed || steps.sync_fix.outputs.changed }}
          CONFLICTED: ${{ steps.sync.outputs.conflicted || steps.sync_fix.outputs.conflicted }}
          CURSOR_USED: ${{ steps.sync.outputs.cursor_used || steps.sync_fix.outputs.cursor_used }}
          CI_FIXED: ${{ steps.cifix.outputs.ci_fixed }}
          CI_OK: ${{ steps.cifix.outputs.ci_ok }}
          UPSTREAM_SHA: ${{ steps.sync.outputs.upstream_sha || steps.sync_fix.outputs.upstream_sha }}
          SUGGESTED_TAG: ${{ steps.sync.outputs.suggested_tag || steps.sync_fix.outputs.suggested_tag }}
          SYNC_BRANCH: sync/upstream-public-api
          PR_NUMBER: ${{ steps.publish.outputs.pr_number }}
          PR_URL: ${{ steps.publish.outputs.pr_url }}
          AUTO_MERGE: ${{ steps.publish.outputs.auto_merge }}
          DRY_RUN: ${{ inputs.dry_run || false }}
        run: |
          {
            echo "## Sync Upstream"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Mode | \`${MODE}\` |"
            echo "| Changed | \`${CHANGED:-n/a}\` |"
            echo "| Conflicts | \`${CONFLICTED:-n/a}\` |"
            echo "| Cursor (merge) | \`${CURSOR_USED:-n/a}\` |"
            echo "| Cursor (CI fix) | \`${CI_FIXED:-n/a}\` |"
            echo "| CI ok | \`${CI_OK:-n/a}\` |"
            echo "| Upstream SHA | \`${UPSTREAM_SHA:-n/a}\` |"
            echo "| Suggested tag | \`${SUGGESTED_TAG:-n/a}\` |"
            echo "| Sync branch | \`${SYNC_BRANCH}\` |"
            echo "| Dry run | \`${DRY_RUN}\` |"
            echo "| PR | ${PR_URL:-${PR_NUMBER:-n/a}} |"
            echo "| Auto-merge | \`${AUTO_MERGE:-n/a}\` |"
          } >> "${GITHUB_STEP_SUMMARY}"
